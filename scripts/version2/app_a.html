<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSocket Community - App A</title>
    <style>
        :root { --primary: #00a8ff; --bg: #0a0a0b; --card: #141417; --text: #f0f0f2; --dim: #9ea0a5; --border: rgba(255, 255, 255, 0.08); --success: #00d2d3; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 500px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 1.5rem; display: flex; flex-direction: column; height: 80vh; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .community-badge { background: rgba(0, 168, 255, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; }
        .chat-window { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 16px; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 12px; margin-bottom: 1rem; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .message.sent { align-self: flex-end; background: var(--primary); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }
        .message.received { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .sender { font-size: 0.65rem; font-weight: 800; margin-bottom: 4px; color: var(--primary); text-transform: uppercase; }
        .msg-meta { font-size: 0.6rem; opacity: 0.5; margin-top: 4px; text-align: right; }
        .input-area { display: flex; gap: 8px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        button { background: var(--primary); border: none; color: #000; padding: 0 18px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        button:disabled { opacity: 0.5; transform: none; }
        .user-tag { font-size: 0.7rem; color: var(--dim); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="community-badge">COMMUNITY SQUARE</div>
            <div class="user-tag" id="user-display">App A</div>
        </div>
        <div class="chat-window" id="chat"></div>
        <form class="input-area" id="msg-form">
            <input type="text" id="msg-input" placeholder="Broadcast to community..." autocomplete="off">
            <button type="submit" id="send-btn" disabled>SEND</button>
        </form>
    </div>

    <script>
        const BASE_URL = 'https://bluesocket-six.vercel.app/api';
        const APP_IDENTITY = { username: 'App_A', password: '143Anna_A' }; // Unique identity
        
        const chatEl = document.getElementById('chat');
        const formEl = document.getElementById('msg-form');
        const inputEl = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const userDisplay = document.getElementById('user-display');

        let token, userId, connId, lastSync = null;
        const processedMessages = new Set();

        function addMessage(text, type, sender = "ME") {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `<div class="sender">${sender}</div><div>${text}</div><div class="msg-meta">${time}</div>`;
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        async function init() {
            try {
                userDisplay.innerText = "Connecting...";
                const authRes = await fetch(`${BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(APP_IDENTITY)
                });
                const authData = await authRes.json();
                token = authData.token;
                userId = authData.user.user_id;

                const regRes = await fetch(`${BASE_URL}/bluesocket/register`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: 'COMMUNITY_NODE_A', device_type: 'web' })
                });
                const regData = await regRes.json();
                connId = regData.connection_id;

                userDisplay.innerText = `Logged in as ${APP_IDENTITY.username}`;
                sendBtn.disabled = false;
                addMessage("Joined the community square.", "received", "SYSTEM");

                startSync();
            } catch (err) {
                userDisplay.innerText = "Offline";
                console.error(err);
            }
        }

        async function startSync() {
            while (true) {
                try {
                    const url = `${BASE_URL}/bluesocket/sync?connection_id=${connId}&wait=true${lastSync ? `&last_sync_timestamp=${lastSync}` : ''}`;
                    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                    const data = await res.json();
                    lastSync = data.server_timestamp;

                    data.events?.forEach(event => {
                        const msgId = event.payload.message_id;
                        const payload = event.payload.payload;
                        const fromName = event.payload.from_username;
                        
                        if (!processedMessages.has(msgId) && fromName !== APP_IDENTITY.username) {
                            processedMessages.add(msgId);
                            addMessage(payload.text, "received", fromName);
                        }
                    });
                } catch (e) {
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        }

        formEl.onsubmit = async (e) => {
            e.preventDefault();
            const text = inputEl.value.trim();
            if (!text) return;
            inputEl.value = '';
            addMessage(text, "sent", "ME");

            await fetch(`${BASE_URL}/bluesocket/send`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    to_user_id: 'COMMUNITY', // GLOBAL TARGET
                    connection_id: connId,
                    payload: { text }
                })
            });
        };
        init();
    </script>
</body>
</html>
