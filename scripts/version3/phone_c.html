<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone C - BlueSocket v3 (Secured)</title>
    <style>
        :root { --primary: #00d2d3; --bg: #0a0a0b; --sidebar: #111113; --card: #141417; --text: #f0f0f2; --dim: #9ea0a5; --border: rgba(255, 255, 255, 0.08); --success: #00d2d3; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 1rem; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-size: 0.8rem; font-weight: 700; color: var(--primary); }
        .layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 200px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 1rem; }
        .section-label { font-size: 0.6rem; font-weight: 800; color: var(--dim); text-transform: uppercase; margin: 1.2rem 0 0.5rem; letter-spacing: 1px; }
        .nav-item { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-bottom: 4px; transition: 0.2s; display: flex; align-items: center; gap: 8px; position: relative;}
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(0, 210, 211, 0.1); color: var(--primary); font-weight: 600; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); }
        .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 0.85rem; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--primary); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg-sender { font-size: 0.6rem; font-weight: 800; margin-bottom: 4px; color: var(--primary); text-transform: uppercase; }
        
        .input-area { padding: 1rem; border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; gap: 10px; background: var(--card); padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; padding: 8px 12px; color: #fff; outline: none; }
        button { background: var(--primary); border: none; color: #000; padding: 0 15px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <header class="header">
        <div class="user-info">PHONE C <small id="my-id" style="color:var(--dim); font-weight:normal"></small></div>
        <div id="status" style="font-size: 0.6rem; color: var(--dim)">Syncing...</div>
    </header>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-scroll">
                <div class="section-label">Channels</div>
                <div class="nav-item active" id="nav-COMMUNITY" onclick="switchTarget('COMMUNITY', 'Community Square')">🌐 Community</div>
                <div class="nav-item" id="nav-GRP_1" onclick="switchTarget('GRP_1', 'Secret Group 1')">👥 Group 1</div>
                
                <div class="section-label">Secured Contacts</div>
                <div id="contacts-list"></div>
            </div>
        </aside>
        <main class="chat-area">
            <div class="chat-header">
                <span id="chat-title">Community Square</span>
                <span id="target-id-display" style="font-size:0.6rem; color:var(--dim)">Target: COMMUNITY</span>
            </div>
            <div class="messages" id="msgs"></div>
            <form class="input-area" onsubmit="send(event)">
                <div class="input-wrapper">
                    <input type="text" id="in" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" id="send-btn" disabled>SEND</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        const BASE = window.location.origin + '/api';
        const IDENTITY = { name: 'Client_C', pass: '143Anna_C' };
        const PEERS = ['Client_A', 'Client_B', 'Client_D'];
        
        let token, uid, cid, lastSync = null, currentTarget = 'COMMUNITY';
        let channelHistory = JSON.parse(localStorage.getItem(`bs_history_${IDENTITY.name}`)) || { COMMUNITY: [], GRP_1: [] };
        const processed = new Set();
        const contactBook = {}; 

        function saveHistory() {
            localStorage.setItem(`bs_history_${IDENTITY.name}`, JSON.stringify(channelHistory));
        }

        async function init() {
            render();
            try {
                const r1 = await fetch(`${BASE}/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: IDENTITY.name, password: IDENTITY.pass }) });
                const d1 = await r1.json(); token = d1.token; uid = d1.user.user_id;
                document.getElementById('my-id').innerText = `(${uid})`;

                const r2 = await fetch(`${BASE}/bluesocket/register`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ device_id: 'V3_PHONE_C', device_type: 'mobile' }) });
                const d2 = await r2.json(); cid = d2.connection_id;

                await fetch(`${BASE}/bluesocket/join-group`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ group_id: 'GRP_1' }) });
                
                document.getElementById('status').innerText = 'Online • Secured';
                document.getElementById('send-btn').disabled = false;
                
                sync();
                performHandshake();
                setInterval(performHandshake, 5000); 
            } catch(e) { document.getElementById('status').innerText = 'Handshake Failed'; }
        }

        async function performHandshake() {
            try {
                const r = await fetch(`${BASE}/bluesocket/resolve`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames: PEERS })
                });
                const d = await r.json();
                const list = document.getElementById('contacts-list');
                Object.entries(d.resolved).forEach(([name, id]) => {
                    if (!contactBook[name]) {
                        contactBook[name] = id;
                        const item = document.createElement('div');
                        item.className = 'nav-item';
                        item.id = `nav-${id}`;
                        item.innerHTML = `<span>👤</span> ${name} <div class="status-dot online"></div>`;
                        item.onclick = () => switchTarget(id, `Private: ${name}`);
                        list.appendChild(item);
                    }
                });
            } catch(e) {}
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function switchTarget(t, label) {
            currentTarget = t;
            document.getElementById('chat-title').innerText = label;
            document.getElementById('target-id-display').innerText = `Target: ${t}`;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${t}`);
            if (activeNav) activeNav.classList.add('active');
            
            // Close sidebar on mobile after selection
            if (window.innerWidth <= 768) toggleSidebar();
            
            render();
        }

        function render() {
            const m = document.getElementById('msgs'); m.innerHTML = '';
            (channelHistory[currentTarget] || []).forEach(msg => {
                const d = document.createElement('div');
                d.className = `msg ${msg.type}`;
                const status = msg.status === 'pending' ? ' <small style="opacity:0.5">...</small>' : '';
                d.innerHTML = `<div class="msg-sender">${msg.sender}</div>${msg.text}${status}`;
                m.appendChild(d);
            });
            m.scrollTop = m.scrollHeight;
        }

        async function send(e) {
            e.preventDefault();
            const i = document.getElementById('in');
            const text = i.value; if(!text) return; i.value = '';
            
            const txId = 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            const msg = { text, type: 'sent', sender: 'ME', txId, status: 'pending', timestamp: new Date().toISOString() };
            
            channelHistory[currentTarget] = channelHistory[currentTarget] || [];
            channelHistory[currentTarget].push(msg);
            saveHistory();
            render();

            try {
                const r = await fetch(`${BASE}/bluesocket/send`, { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ 
                        to_user_id: currentTarget, 
                        connection_id: cid, 
                        payload: { text, txId } 
                    }) 
                });
                const data = await r.json();
                msg.message_id = data.message_id;
                msg.status = 'sent';
                saveHistory();
                render();
            } catch (e) {
                console.error('Send failed', e);
            }
        }

        async function sync() {
            while(true) {
                try {
                    const r = await fetch(`${BASE}/bluesocket/sync?connection_id=${cid}&wait=true${lastSync ? `&last_sync_timestamp=${lastSync}` : ''}`, { headers: { 'Authorization': `Bearer ${token}` } });
                    const d = await r.json(); 
                    if (d.server_timestamp) lastSync = d.server_timestamp;
                    
                    d.events?.forEach(e => {
                        const message_id = e.payload.message_id;
                        const txId = e.payload.payload.txId;
                        
                        if(processed.has(message_id)) return;
                        processed.add(message_id);

                        const channelKey = (e.payload.target === 'COMMUNITY' || e.payload.target === 'GRP_1') ? e.payload.target : e.payload.from_user_id;
                        channelHistory[channelKey] = channelHistory[channelKey] || [];

                        const existing = channelHistory[channelKey].find(m => (txId && m.txId === txId) || (message_id && m.message_id === message_id));
                        
                        if (existing) {
                            existing.message_id = message_id;
                            existing.status = 'delivered';
                        } else if (e.payload.from_user_id !== uid) {
                            channelHistory[channelKey].push({ 
                                text: e.payload.payload.text, 
                                type: 'received', 
                                sender: e.payload.from_username,
                                message_id: message_id,
                                timestamp: e.timestamp
                            });
                        }
                        
                        saveHistory();
                        if(channelKey === currentTarget) render();
                    });
                } catch(e) { 
                    console.error('Sync error', e);
                    await new Promise(r => setTimeout(r, 2000)); 
                }
            }
        }
        init();
    </script>
</body>
</html>
